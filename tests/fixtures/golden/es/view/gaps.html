<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ignite Artifact View</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #5b6871;
      --line: #d8dee4;
      --panel: #f7f9fb;
      --accent: #0f766e;
      --accent-2: #7c3aed;
      --warn: #b45309;
      --gap: #b91c1c;
      --ok: #1d4ed8;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: #ffffff; }
    header { padding: 22px 28px 18px; border-bottom: 1px solid var(--line); background: #f9fbfc; }
    .eyebrow { color: var(--accent); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    h1 { margin: 6px 0 8px; font-size: 28px; line-height: 1.15; letter-spacing: 0; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px 18px; color: var(--muted); font-size: 13px; }
    .layout { display: grid; grid-template-columns: minmax(210px, 260px) minmax(0, 1fr) minmax(250px, 310px); min-height: calc(100vh - 94px); }
    nav, aside { position: sticky; top: 0; align-self: start; max-height: 100vh; overflow: auto; padding: 18px; background: var(--panel); border-right: 1px solid var(--line); }
    aside { border-right: 0; border-left: 1px solid var(--line); }
    main { min-width: 0; padding: 22px 30px 60px; }
    input[type="search"] { width: 100%; height: 34px; border: 1px solid var(--line); border-radius: 6px; padding: 0 10px; font: inherit; background: #fff; }
    .toc { margin-top: 16px; display: grid; gap: 4px; }
    .toc a { color: var(--ink); text-decoration: none; font-size: 13px; padding: 7px 8px; border-radius: 6px; border: 1px solid transparent; }
    .toc a:hover { border-color: var(--line); background: #fff; }
    .toc .level-2 { padding-left: 16px; }
    .toc .level-3, .toc .level-4, .toc .level-5, .toc .level-6 { padding-left: 24px; color: var(--muted); }
    .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin: 16px 0; }
    .stat { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 10px; }
    .stat strong { display: block; font-size: 21px; }
    .stat span { color: var(--muted); font-size: 12px; }
    section.artifact-section { padding: 14px 0 24px; border-bottom: 1px solid var(--line); scroll-margin-top: 16px; }
    section.artifact-section.hidden { display: none; }
    .section-meta { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .content h1, .content h2, .content h3 { letter-spacing: 0; }
    .content h1 { font-size: 25px; }
    .content h2 { font-size: 21px; }
    .content h3 { font-size: 18px; }
    .content p, .content li { line-height: 1.55; }
    code { background: #eef2f6; padding: 1px 5px; border-radius: 4px; }
    pre { overflow: auto; background: #101820; color: #f4f7fa; border-radius: 8px; padding: 12px; }
    mark.marker { border-radius: 4px; padding: 1px 3px; }
    mark.pending { background: #fef3c7; color: #7c2d12; }
    mark.gap { background: #fee2e2; color: #7f1d1d; }
    mark.assumption { background: #ede9fe; color: #4c1d95; }
    mark.marker:target { outline: 2px solid var(--accent); outline-offset: 2px; }
    .badge { display: inline-flex; align-items: center; min-height: 22px; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .badge.populated { background: #dcfce7; color: #14532d; }
    .badge.pending { background: #fef3c7; color: #7c2d12; }
    .badge.assumed { background: #ede9fe; color: #4c1d95; }
    .side-title { margin: 16px 0 8px; font-size: 13px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: .06em; }
    select { width: 100%; height: 34px; border: 1px solid var(--line); border-radius: 6px; padding: 0 8px; font: inherit; background: #fff; }
    .pill-list { display: grid; gap: 8px; }
    .pill { display: block; text-decoration: none; color: var(--ink); background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--accent); border-radius: 8px; padding: 9px; font-size: 13px; }
    .pill.gap { border-left-color: var(--gap); }
    .pill.pending { border-left-color: var(--warn); }
    .pill.assumption { border-left-color: var(--accent-2); }
    .pill[hidden] { display: none; }
    .pill-meta { margin-top: 6px; color: var(--muted); display: grid; gap: 4px; }
    .pill-meta b { color: var(--ink); }
    .evidence-card { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 9px; font-size: 13px; }
    .evidence-card summary { cursor: pointer; font-weight: 700; }
    .evidence-card summary span { color: var(--muted); font-weight: 400; }
    .mini-graph { margin-top: 8px; display: grid; gap: 5px; }
    .mini-node, .mini-edge { border: 1px solid var(--line); border-radius: 6px; padding: 6px; background: #fbfcfd; }
    .mini-edge { color: var(--muted); }
    .source-fragment { max-height: 220px; white-space: pre-wrap; overflow: auto; background: #101820; color: #f4f7fa; border-radius: 8px; padding: 10px; font-family: Consolas, monospace; font-size: 12px; }
    .empty { color: var(--muted); font-size: 13px; }
    button { font: inherit; }
    .source-toggle, .feedback-target, .feedback-action { margin-top: 10px; border: 1px solid var(--line); background: #fff; border-radius: 6px; padding: 7px 10px; cursor: pointer; }
    .feedback-target { margin-right: 6px; }
    .feedback-action.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .markdown-source { display: none; white-space: pre-wrap; margin-top: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfd; padding: 12px; font-family: Consolas, monospace; font-size: 12px; overflow: auto; }
    .markdown-source.open { display: block; }
    .feedback-panel { display: grid; gap: 8px; background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 9px; font-size: 13px; }
    .feedback-panel label { display: grid; gap: 4px; color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .feedback-panel input, .feedback-panel textarea { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 8px; font: inherit; background: #fff; }
    .feedback-panel textarea { min-height: 88px; resize: vertical; }
    .feedback-target-note { color: var(--muted); font-size: 12px; }
    .feedback-list { display: grid; gap: 7px; }
    .feedback-item { border: 1px solid var(--line); border-radius: 6px; padding: 7px; background: #fbfcfd; }
    .feedback-export { display: none; max-height: 180px; white-space: pre-wrap; overflow: auto; border: 1px solid var(--line); border-radius: 6px; background: #101820; color: #f4f7fa; padding: 8px; font-family: Consolas, monospace; font-size: 11px; }
    .feedback-export.open { display: block; }
    .pill a { color: var(--ink); text-decoration: none; }
    .guided-panel { display: grid; gap: 8px; }
    .guided-progress { color: var(--muted); font-size: 12px; }
    .guided-item { background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--ok); border-radius: 8px; padding: 9px; font-size: 13px; }
    .guided-item.domain { border-left-color: var(--warn); }
    .guided-item.ba_assumption { border-left-color: var(--accent-2); }
    .guided-item textarea { width: 100%; min-height: 70px; margin-top: 7px; border: 1px solid var(--line); border-radius: 6px; padding: 8px; font: inherit; resize: vertical; }
    .guided-item a { color: var(--ink); text-decoration: none; font-weight: 700; }
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      nav, aside { position: static; max-height: none; border: 0; border-bottom: 1px solid var(--line); }
      main { padding: 18px; }
    }
  </style>

nder directamente debajo de cada gap. Una respuesta breve sirve si es precisa. Si la respuesta corresponde a otro equipo, indicar el owner y cualquier información parcial disponible.\n\nFormato sugerido de respuesta:\n\n- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión: confirmado / pendiente / no aplica\n", "children": [{"id": "block-002.001", "type": "section", "line_start": 9, "line_end": 9, "markdown": "## Cómo responder"}, {"id": "block-002.002", "type": "ears-statement", "line_start": 11, "line_end": 11, "markdown": "Por favor responder directamente debajo de cada gap. Una respuesta breve sirve si es precisa. Si la respuesta corresponde a otro equipo, indicar el owner y cualquier información parcial disponible."}, {"id": "block-002.003", "type": "section", "line_start": 13, "line_end": 13, "markdown": "Formato sugerido de respuesta:"}, {"id": "block-002.004", "type": "section", "line_start": 15, "line_end": 18, "markdown": "- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión: confirmado / pendiente / no aplica"}]}, {"id": "block-003", "type": "section", "level": 2, "title": "Secciones para respuesta del cliente", "section_path": "Gaps de Discovery - [PROJECT_ID] > Secciones para respuesta del cliente", "line_start": 20, "line_end": 21, "markdown": "## Secciones para respuesta del cliente\n", "children": [{"id": "block-003.001", "type": "section", "line_start": 20, "line_end": 20, "markdown": "## Secciones para respuesta del cliente"}]}, {"id": "block-004", "type": "section", "level": 3, "title": "GAP-BUSINESS-RULES - Reglas de negocio", "section_path": "Gaps de Discovery - [PROJECT_ID] > Secciones para respuesta del cliente > GAP-BUSINESS-RULES - Reglas de negocio", "line_start": 22, "line_end": 55, "markdown": "### GAP-BUSINESS-RULES - Reglas de negocio\n\n- Lente: `business`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`\n\nDescripción breve:\nLas reglas de negocio, "line_start": 38, "line_end": 39, "markdown": "Pregunta:\n¿Qué reglas, excepciones, validaciones, fallbacks o exclusiones gobiernan el comportamiento?"}, {"id": "block-004.007", "type": "ears-statement", "line_start": 41, "line_end": 42, "markdown": "Formato de respuesta esperado:\nReglas en formato EARS cuando describen comportamiento: Si <condición/regla>, entonces el sistema debe <respuesta>; incluir umbrales y excepciones."}, {"id": "block-004.008", "type": "ears-statement", "line_start": 44, "line_end": 45, "markdown": "Ejemplo de respuesta útil:\nUna cola es de alto riesgo cuando más de 10 casos están a menos de 30 minutos de breach de SLA o cuando cualquier caso ya está vencido."}, {"id": "block-004.009", "type": "section", "line_start": 48, "line_end": 48, "markdown": "Respuesta del cliente / dominio:"}, {"id": "block-004.010", "type": "section", "line_start": 50, "line_end": 53, "markdown": "- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:"}]}, {"id": "block-005", "type": "section", "level": 3, "title": "GAP-PRD-PERSONA-DETAIL - Detalle de personas para PRD", "section_path": "Gaps de Discovery - [PROJECT_ID] > Secciones para respuesta del cliente > GAP-PRD-PERSONA-DETAIL - Detalle de personas para PRD", "line_start": 56, "line_end": 89, "markdown": "### GAP-PRD-PERSONA-DETAIL - Detalle de personas para PRD\n\n- Lente: `business`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`\n\nDescripción breve:\nPersona attributes are not complete enough for a PRD: goals, pain points, proficiency, and usage frequency are unclear.\n\nPor qué importa (riesgo si queda abierto):\nEl PRD necesita personas con objetivos, dolores, frecuencia y habilidad para orientar experiencia, adopcion y soporte.\n\nQué desbloquea esta respuesta:\nLa sección de Personas del PRD.\n\nPregunta:\n¿Qué información confirmada resuelve esta incertidumbre?\n\nFormato de respuesta esperado:\nPor persona: objetivo, dolores, frecuencia y habilidad.\n\nEjemplo de respuesta útil:\nPersona primaria: operador central. Objetivo: resolver casos sin TI. Dolor: proceso manual riesgoso. Frecuencia: diaria. Habilidad: herramienta interna avanzada.\n\n\nRespuesta del cliente / dominio:\n\n- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:\n\n", "children": [{"id": "block-005.001", "type": "traceability", "line_start": 56, "line_end": 56, "markdown": "### GAP-PRD-PERSONA-DETAIL - Detalle de personas para PRD"}, {"id": "block-005.002", "type": "traceability", "line_start": 58, "line_end": 61, "markdown": "- Lente: `business`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`"}, {"id": "block-005.003", "type": "persona", "line_start": 63, "line_end": 64, "markdown": "Descripción breve:\nPersona attributes are not complete enough for a PRD: goals, pain points, proficiency, and usage frequency are unclear."}, {"id": "block-005.004", "type": "persona", "line_start": 66, "line_end": 67, "markdown": "Por qué importa (riesgo si queda abierto):\nEl PRD necesita personas con objetivos, dolores, frecuencia y habilidad para orientar experiencia, adopcion y soporte."}, {"id": "block-005.005", "type": "persona", "line_start": 69, "line_end": 70, "markdown": "Qué desbloquea esta respuesta:\nLa sección de Personas del PRD."}, {"id": "block-005.006", "type": "section", "line_start": 72, "line_end": 73, "markdown": "Pregunta:\n¿Qué información confirmada resuelve esta incertidumbre?"}, {"id": "block-005.007", "type": "persona", "line_start": 75, "line_end": 76, "markdown": "Formato de respuesta esperado:\nPor persona: objetivo, dolores, frecuencia y habilidad."}, {"id": "block-005.008", "type": "persona", "line_start": 78, "line_end": 79, "markdown": "Ejemplo de respuesta útil:\nPersona primaria: operador central. Objetivo: resolver casos sin TI. Dolor: proceso manual riesgoso. Frecuencia: diaria. Habilidad: herramienta interna avanzada."}, {"id": "block-005.009", "type": "section", "line_start": 82, "line_end": 82, "markdown": "Respuesta del cliente / dominio:"}, {"id": "block-005.010", "type": "section", "line_start": 84, "line_end": 87, "markdown": "- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:"}]}, {"id": "block-006", "type": "section", "level": 3, "title": "GAP-METRIC-SOURCE - Fuente de métrica", "section_path": "Gaps de Discovery - [PROJECT_ID] > Secciones para respuesta del cliente > GAP-METRIC-SOURCE - Fuente de métrica", "line_start": 90, "line_end": 131, "markdown": "### GAP-METRIC-SOURCE - Fuente de métrica\n\n- Lente: `business`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`\n\nDescripción breve:\nAparece una métrica cuantitativa sin fuente o baseline explícito.\n\nEvidencia que dispara la pregunta:\nLa métrica \"30 por ciento\" aparece sin fuente, baseline ni método de medición.\n\nPor qué importa (riesgo si queda abierto):\nLas métricas necesitan fuente o baseline para medir el éxito de manera consistente.\n\nQué desbloquea esta respuesta:\nLos KPIs del brief y la sección de NFRs/KPIs y medición del PRD.\n\nPregunta:\n¿Cuál es la fuente o baseline de la métrica cuantitativa?\n\nFormato de respuesta esperado:\nNombre de la métrica + fuente/owner del baseline + valor objetivo + ventana de medición.\n\nEjemplo de respuesta útil:\nEl baseline sale del reporte semanal de operaciones, owner Support Ops; el target es detectar colas de alto riesgo antes de las 9:30 AM.\n\nOpciones candidatas citadas (no seleccionadas):\n- Opcion A: Confirmar que `30 por ciento` es la meta de exito y aportar fuente, baseline, owner y metodo de medicion. Cita local: `30 por ciento`.\n- Opcion B: Tratar `30 por ciento` como objetivo direccional hasta confirmar fuente/baseline, indicando que evidencia falta. Cita local: `30 por ciento`.\nEstas opciones no cierran el gap; el BA/owner debe confirmar una respuesta.\n\n\nRespuesta del cliente / dominio:\n\n- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:\n\n", "children": [{"id": "block-006.001", "type": "traceability", "line_start": 90, "line_end": 90, "markdown": "### GAP-METRIC-SOURCE - Fuente de métrica"}, {"id": "block-006.002", "type": "traceability", "line_start": 92, "line_end": 95, "markdown": "- Lente: `business`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`"}, {"id": "block-006.003", "type": "section", "line_start": 97, "line_end": 98, "markdown": "Descripción breve:\nAparece una métrica cuantitativa sin fuente o baseline explícito."}, {"id": "block-006.004", "type": "section", "line_start": 100, "line_end": 101, "markdown": "Evidencia que dispara la pregunta:\nLa métrica \"30 por ciento\" aparece sin fuente, baseline ni método de medición."}, {"id": "block-006.005", "type": "ears-statement", "line_start": 103, "line_end": 104, "markdown": "Por qué importa (riesgo si queda abierto):\nLas métricas necesitan fuente o baseline para medir el éxito de manera consistente."}, {"id": "block-006.006", "type": "section", "line_start": 106, "line_end": 107, "markdown": "Qué desbloquea esta respuesta:\nLos KPIs del brief y la sección de NFRs/KPIs y medición del PRD."}, {"id": "block-006.007", "type": "section", "line_start": 109, "line_end": 110, "markdown": "Pregunta:\n¿Cuál es la fuente o baseline de la métrica cuantitativa?"}, {"id": "block-006.008", "type": "section", "line_start": 112, "line_end": 113, "markdown": "Formato de respuesta esperado:\nNombre de la métrica + fuente/owner del baseline + valor objetivo + ventana de medición."}, {"id": "block-006.009", "type": "section", "line_start": 115, "line_end": 116, "markdown": "Ejemplo de respuesta útil:\nEl baseline sale del reporte semanal de operaciones, owner Support Ops; el target es detectar colas de alto riesgo antes de las 9:30 AM."}, {"id": "block-006.010", "type": "section", "line_start": 118, "line_end": 121, "markdown": "Opciones candidatas citadas (no seleccionadas):\n- Opcion A: Confirmar que `30 por ciento` es la meta de exito y aportar fuente, baseline, owner y metodo de medicion. Cita local: `30 por ciento`.\n- Opcion B: Tratar `30 por ciento` como objetivo direccional hasta confirmar fuente/baseline, indicando que evidencia falta. Cita local: `30 por ciento`.\nEstas opciones no cierran el gap; el BA/owner debe confirmar una respuesta."}, {"id": "block-006.011", "type": "section", "line_start": 124, "line_end": 124, "markdown": "Respuesta del cliente / dominio:"}, {"id": "block-006.012", "type": "section", "line_start": 126, "line_end": 129, "markdown": "- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:"}]}, {"id": "block-007", "type": "section", "level": 3, "title": "GAP-METRIC-DEFINITION - Definición de métrica", "section_path": "Gaps de Discovery - [PROJECT_ID] > Secciones para respuesta del cliente > GAP-METRIC-DEFINITION - Definición de métrica", "line_start": 132, "line_end": 173, "markdown": "### GAP-METRIC-DEFINITION - Definición de métrica\n\n- Lente: `business`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`\n\nDescripción breve:\nSe nombra una métrica, KPI o indicador sin su definición, fórmula, unidad, fuente ni umbral.\n\nEvidencia que dispara la pregunta:\nEl input menciona \"metrica\" pero no define la métrica: falta fórmula/unidad, fuente o umbral.\n\nPor qué importa (riesgo si queda abierto):\nUna métrica nombrada sin definición, fuente ni umbral no es medible ni comprometible y arrastra ambigüedad a KPIs y criterios de éxito.\n\nQué desbloquea esta respuesta:\nLos KPIs del brief y la sección de NFRs/KPIs y medición del PRD.\n\nPregunta:\n¿Cómo se define cada métrica/KPI (fórmula, unidad), de qué fuente sale y cuál es su baseline y umbral objetivo?\n\nFormato de respuesta esperado:\nPor métrica: definición/fórmula, unidad, fuente/owner del dato, baseline y umbral objetivo.\n\nEjemplo de respuesta útil:\nLa métrica 'tiempo de resolución' se define como promedio de horas entre apertura y cierre, fuente Case Management, baseline 8h, umbral objetivo 6h.\n\nOpciones candidatas citadas (no seleccionadas):\n- Opcion A: Confirmar que `metrica` esta dentro del alcance y responder el detalle faltante de `Definición de métrica`. Cita local: `metrica`.\n- Opcion B: Confirmar que `metrica` es solo contexto, fuera de alcance o pendiente, y explicitar el limite. Cita local: `metrica`.\nEstas opciones no cierran el gap; el BA/owner debe confirmar una respuesta.\n\n\nRespuesta del cliente / dominio:\n\n- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:\n\n", "children": [{"id": "block-007.001", "type": "traceability", "line_start": 132, "line_end": 132, "markdown": "### GAP-METRIC-DEFINITION - Definición de métrica"}, {"id": "block-007.002", "type": "traceability", "line_start": 134, "line_end": 137, "markdown": "- Lente: `business`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`"}, {"id": "block-007.003", "type": "section", "line_start": 139, "line_end": 140, "markdown": "Descripción breve:\nSe nombra una métrica, KPI o indicador sin su definición, fórmula, unidad, fuente ni umbral."}, {"id": "block-007.004", "type": "section", "line_start": 142, "line_end": 143, "markdown": "Evidencia que dispara la pregunta:\nEl input menciona \"metrica\" pero no define la métrica: falta fórmula/unidad, fuente o umbral."}, {"id": "block-007.005", "type": "ears-statement", "line_start": 145, "line_end": 146, "markdown": "Por qué importa (riesgo si queda abierto):\nUna métrica nombrada sin definición, fuente ni umbral no es medible ni comprometible y arrastra ambigüedad a KPIs y criterios de éxito."}, {"id": "block-007.006", "type": "section", "line_start": 148, "line_end": 149, "markdown": "Qué desbloquea esta respuesta:\nLos KPIs del brief y la sección de NFRs/KPIs y medición del PRD."}, {"id": "block-007.007", "type": "section", "line_start": 151, "line_end": 1 parar impacto.\n\nPor qué importa (riesgo si queda abierto):\nEl delta entre comportamiento actual y objetivo guía el análisis de impacto y el slicing de backlog.\n\nQué desbloquea esta respuesta:\nLa sección 3 del brief (as-is/to-be) y el slicing del backlog.\n\nPregunta:\n¿Cuál es el proceso actual, el proceso objetivo y el delta exacto entre ambos?\n\nFormato de respuesta esperado:\nComportamiento actual vs objetivo, expresado como delta.\n\nEjemplo de respuesta útil:\nHoy los analistas abren cada cola para inferir riesgo. To-be: la lista muestra riesgo directamente para priorizar antes de abrir detalle.\n\n\nRespuesta del cliente / dominio:\n\n- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:\n\n", "children": [{"id": "block-008.001", "type": "traceability", "line_start": 174, "line_end": 174, "markdown": "### GAP-PRODUCT-ASIS-TOBE - Proceso actual y objetivo"}, {"id": "block-008.002", "type": "traceability", "line_start": 176, "line_end": 179, "markdown": "- Lente: `product`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`"}, {"id": "block-008.003", "type": "section", "line_start": 181, "line_end": 182, "markdown": "Descripción breve:\nEl estado actual y el estado objetivo no están suficientemente claros para comparar impacto."}, {"id": "block-008.004", "type": "ears-statement", "line_start": 184, "line_end": 185, "markdown": "Por qué importa (riesgo si queda abierto):\nEl delta entre comportamiento actual y objetivo guía el análisis de impacto y el slicing de backlog."}, {"id": "block-008.005", "type": "section", "line_start": 187, "line_end": 188, "markdown": "Qué desbloquea esta respuesta:\nLa sección 3 del brief (as-is/to-be) y el slicing del backlog."}, {"id": "block-008.006", "type": "section", "line_start": 190, "line_end": 191, "markdown": "Pregunta:\n¿Cuál es el proceso actual, el proceso objetivo y el delta exacto entre ambos?"}, {"id": "block-008.007", "type": "section", "line_start": 19 lto riesgo con datos vigentes. Diferir exportacion, bulk actions y reglas avanzadas. No dividir en crear boton/endpoint/tabla porque ninguna parte sola valida valor.\n\n\nRespuesta del cliente / dominio:\n\n- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:\n\n", "children": [{"id": "block-009.001", "type": "traceability", "line_start": 208, "line_end": 208, "markdown": "### GAP-BACKLOG-SLICING-READINESS - Preparacion de slicing de backlog"}, {"id": "block-009.002", "type": "traceability", "line_start": 210, "line_end": 213, "markdown": "- Lente: `product`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`"}, {"id": "block-009.003", "type": "section", "line_start": 215, "line_end": 216, "markdown": "Descripción breve:\nNo estan explicitas las senales necesarias para slicing de backlog: primer slice de valor, paths, variantes, reglas diferibles o limites de historia."}, {"id": "block-009.004", "type": "ears-statement", "line_start": 218, "line_end": 219, "markdown": "Por qué importa (riesgo si queda abierto):\nEl backlog necesita saber cual es el primer slice de valor, que variantes pueden diferirse y donde no conviene cortar por debajo del valor."}, {"id": "block-009.005", "type": "section", "line_start": 221, "line_end": 222, "markdown": "Qué desbloquea esta respuesta:\nEl primer slice de valor y los límites de slicing del backlog."}, {"id": "block-009.006", "type": "section", "line_start": 224, "line_end": 225, "markdown": "Pregunta:\n¿Cuál es el primer slice de valor observable, qué variantes o reglas pueden diferirse y dónde cortar más pequeño dejaría de aportar valor?"}, {"id": "block-009.007", "type": "section", "line_start": 227, "line_end": 228, "markdown": "Formato de respuesta esperado:\nEl primer slice de valor más qué se difiere y dónde no conviene cortar."}, {"id": "block-009.008", "type": "section", "line_start": 230, "line_end": 231, "markdown": "Ejemplo de respuesta útil:\nPrimer slice: usuario autorizado ve un caso de alto riesgo con datos vigentes. Diferir exportacion, bulk actions y reglas avanzadas. No dividir en crear boton/endpoint/tabla porque ninguna parte sola valida valor."}, {"id": "block-009.009", "type": "section", "line_start": 234, "line_end": 234, "markdown": "Respuesta del cliente / dominio:"}, {"id": "block-009.010", "type": "section", "line_start": 236, "line_end": 239, "markdown": "- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:"}]}, {"id": "block-010", "type": "section", "level": 3, "title": "GAP-PRD-FR-AC - Requerimientos funcionales y criterios de aceptacion", "section_path": "Gaps de Discovery - [PROJECT_ID] > Secciones para respuesta del cliente > GAP-PRD-FR-AC - Requerimientos funcionales y criterios de aceptacion", "line_start": 242, "line_end": 275, "markdown": "### GAP-PRD-FR-AC - Requerimientos funcionales y criterios de aceptacion\n\n- Lente: `product`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`\n\nDescripción breve:\nFunctional requirements are not decomposed with source-backed acceptance criteria.\n\nPor qué importa (riesgo si queda abierto):\nEl PRD debe listar requerimientos funcionales con criterios de aceptacion trazables para que backlog y QA no inventen alcance.\n\nQué desbloquea esta respuesta:\nLa sección de Requerimientos Funcionales del PRD (FRs con criterios de aceptación).\n\nPregunta:\n¿Qué información confirmada resuelve esta incertidumbre?\n\nFormato de respuesta esperado:\nFR-NN con statement EARS trazable (Cuando/Si/Mientras/Donde/El sistema debe...) más criterio de aceptación y prioridad.\n\nEjemplo de respuesta útil:\nFR-01: el sistema debe listar elementos pendientes. AC: Given existen pendientes, When el operador consulta, Then ve ID, estado, responsable y fecha con fuente trazable.\n\n\nRespuesta del cliente / dominio:\n\n- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:\n\n", "children": [{"id": \n\nDescripción breve:\nLas expectativas de calidad o testeabilidad no están explícitas.\n\nPor qué importa (riesgo si queda abierto):\nLas expectativas de calidad orientan el análisis de riesgo, la profundidad de pruebas y la evidencia requerida.\n\nQué desbloquea esta respuesta:\nLos NFRs del PRD y la estrategia de handoff/testing de Calidad.\n\nPregunta:\n¿Qué expectativas de calidad, testeabilidad, riesgo o compliance aplican?\n\nFormato de respuesta esperado:\nExpectativas de calidad como bullets: áreas de riesgo, profundidad de pruebas y evidencia requerida.\n\nEjemplo de respuesta útil:\nQA debe cubrir happy path, sin datos, datos desactualizados, falla de servicio externo y permisos insuficientes.\n\n\nRespuesta del cliente / dominio:\n\n- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:\n\n", "children": [{"id": "block-012.001", "type": "traceability", "line_start": 310, "line_end": 310, "markdown": "### GAP-QUALITY - Expectativas de calidad"}, {"id": "block-012.002", "type": "traceability", "line_start": 312, "line_end": 315, "markdown": "- Lente: `quality`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`"}, {"id": "block-012.003", "type": "section", "line_start": 317, "line_end": 318, "markdown": "Descripción breve:\nLas expectativas de calidad o testeabilidad no están explícitas."}, {"id": "block-012.004", "type": "ears-statement", "line_start": 320, "line_end": 321, "markdown": "Por qué importa (riesgo si queda abierto):\nLas expectativas de calidad orientan el análisis de riesgo, la profundidad de pruebas y la evidencia requerida."}, {"id": "block-012.005", "type": "section", "line_start": 323, "line_end": 324, "markdown": "Qué desbloquea esta respuesta:\nLos NFRs del PRD y la estrategia de handoff/testing de Calidad."}, {"id": "block-012.006", "type": "section", "line_start": 326, "line_end": 327, "markdown": "Pregunta:\n¿Qué expectativas de calidad, testeabilidad, riesgo o compliance apli ón o casos borde sin testear.\n\nQué desbloquea esta respuesta:\nLos estados UX de specs y la cobertura de casos borde de Calidad.\n\nPregunta:\n¿Qué estados de loading, empty, error, recuperación y accesibilidad deben contemplarse?\n\nFormato de respuesta esperado:\nLos estados de carga, vacío, error y recuperación de la superficie.\n\nEjemplo de respuesta útil:\nMostrar skeleton durante carga, estado neutral sin colas, warning para datos desactualizados y error genérico existente ante fallas de servicio.\n\n\nRespuesta del cliente / dominio:\n\n- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:\n\n", "children": [{"id": "block-027.001", "type": "traceability", "line_start": 820, "line_end": 820, "markdown": "### GAP-DESIGN-STATES - Estados de UX"}, {"id": "block-027.002", "type": "traceability", "line_start": 822, "line_end": 825, "markdown": "- Lente: `design`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`"}, {"id": "block-027.003", "type": "section", "line_start": 827, "line_end": 828, "markdown": "Descripción breve:\nNo están explícitos los estados requeridos de UI: loading, empty, error y recuperación."}, {"id": "block-027.004", "type": "ears-statement", "line_start": 830, "line_end": 831, "markdown": "Por qué importa (riesgo si queda abierto):\nLos estados UX faltantes suelen convertirse en ambigüedad de implementación o casos borde sin testear."}, {"id": "block-027.005", "type": "section", "line_start": 833, "line_end": 834, "markdown": "Qué desbloquea esta respuesta:\nLos estados UX de specs y la cobertura de casos borde de Calidad."}, {"id": "block-027.006", "type": "section", "line_start": 836, "line_end": 837, "markdown": "Pregunta:\n¿Qué estados de loading, empty, error, recuperación y accesibilidad deben contemplarse?"}, {"id": "block-027.007", "type": "section", "line_start": 839, "line_end": 840, "markdown": "Formato de respuesta esperado:\nLos estados de carga, vacío, error y recuperac  "line_end": 445, "markdown": "### GAP-TECH-DATA-SOURCE - Sistemas y ownership de datos\n\n- Lente: `technical`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`\n\nDescripción breve:\nLa fuente de datos, integración u ownership de sistema no está explícito en el input o contexto técnico.\n\nPor qué importa (riesgo si queda abierto):\nTecnología necesita suficiente contexto de sistemas y ownership para analizar arquitectura sin inventar integraciones.\n\nQué desbloquea esta respuesta:\nLa sección 5 del brief (técnica) y los boundaries de sistema y ownership de datos de specs.\n\nPregunta:\n¿Qué sistemas, endpoints, eventos, decisiones de crear/modificar/reutilizar, owners, fuente de verdad y campos críticos están involucrados?\n\nFormato de respuesta esperado:\nSistemas/endpoints involucrados, source of truth y equipo owner.\n\nEjemplo de respuesta útil:\nReutilizar `GET /queues`; modificarlo para incluir `slaRisk`. La fuente de verdad de riesgo es Case Management, owner Operations Platform.\n\n\nRespuesta del cliente / dominio:\n\n- Respuesta:\n- Owner / fuente:\n- Evidencia o referencia:\n- Estado de decisión:\n\n", "blocks": [{"id": "block-015.001", "type": "traceability", "line_start": 412, "line_end": 412, "markdown": "### GAP-TECH-DATA-SOURCE - Sistemas y ownership de datos"}, {"id": "block-015.002", "type": "traceability", "line_start": 414, "line_end": 417, "markdown": "- Lente: `technical`\n- Severidad: `medium`\n- Estado: `OPEN`\n- Requerimiento relacionado: `REQ-001`"}, {"id": "block-015.003", "type": "section", "line_start": 419, "line_end": 420, "markdown": "Descripción breve:\nLa fuente de datos, integración u ownership de sistema no está explícito en el input o contexto técnico."}, {"id": "block-015.004", "type": "ears-statement", "line_start": 422, "line_end": 423, "markdown": "Por qué importa (riesgo si queda abierto):\nTecnología necesita suficiente contexto de sistemas y ownership para analizar arquitectura sin inven       } catch {
        return [];
      }
    }
    function persistFeedback() {
      localStorage.setItem(feedbackKey, JSON.stringify(feedbackComments));
    }
    function saveFeedbackComment() {
      const text = $("feedbackText").value.trim();
      if (!text) return;
      const section = sectionForTarget(feedbackTarget);
      const comment = {
        id: "FBC-" + Date.now(),
        target_type: feedbackTarget.type,
        target_id: feedbackTarget.id,
        marker: feedbackTarget.marker || "",
        gap_id: feedbackTarget.gapId || "",
        section_id: section?.id || "",
        section_path: section?.section_path || "",
        line_start: section?.line_start || "",
        line_end: section?.line_end || "",
        owner_source: $("feedbackOwner").value.trim() || "Artifact review comment",
        decision_status: $("feedbackDecision").value,
        text,
        created_at: new Date().toISOString()
      };
      feedbackComments.push(comment);
      persistFeedback();
      $("feedbackText").value = "";
      renderFeedbackList();
    }
    function renderFeedbackTarget() {
      const section = sectionForTarget(feedbackTarget);
      const marker = feedbackTarget.marker ? " / " + feedbackTarget.marker : "";
      $("feedbackTarget").textContent = "Target: " + feedbackTarget.type + " " + feedbackTarget.id + marker + (section ? " · " + section.section_path : "");
    }
    function renderFeedbackList() {
      $("feedbackList").innerHTML = feedbackComments.length
        ? feedbackComments.map(item => `<div class="feedback-item"><strong>${escapeHtml(item.target_type)} ${escapeHtml(item.marker || item.target_id)}</strong><br>${escapeHtml(item.text)}</div>`).join("")
        : `<div class="empty">No local comments saved.</div>`;
    }
    function exportFeedbackMarkdown() {
      const markdown = buildFeedbackExport(feedbackComments);
      $("feedbackExportText").textContent = markdown;
      $("feedbackExportText").classList.add("open");
      const blob = new Blob([markdown], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${model.project_id}-${model.artifact}-feedback.md`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }
    function draftFeedbackEmail() {
      // IMP-211 (H10, H-JOSE-1): restore the mailto draft the approved prototype
      // had (it was lost in the runtime). Local-first: it only opens a pre-filled
      // draft in the user's own mail client, it never sends. mailto cannot carry
      // attachments, so remind the reviewer to attach the downloaded .md.
      const hasGuided = (model.guided_response?.items || []).some(item => String(guidedAnswers[item.id] || "").trim());
      if (!feedbackComments.length && !hasGuided) {
        alert("Save at least one comment or guided answer before drafting the email.");
        return;
      }
      const subject = `Artifact review feedback - ${model.project_id} - ${model.artifact}`;
      const body = buildFeedbackExport(feedbackComments) + "\n\n(If possible, also attach the downloaded .md file - mailto cannot include attachments.)";
      const recipient = model.ba_email || "";
      window.location.href = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }
    function buildFeedbackExport(comments) {
      const lines = [
        `# Artifact Review Feedback Export - ${model.project_id}`,
        "",
        `- Source artifact: ${model.source_path}`,
        `- Generated at: ${new Date().toISOString()}`,
        `- Resolve gaps command: sentinel /resolve-gaps ${model.project_id} --source PATH`,
        `- Sync command: sentinel /sync ${model.project_id} --source PATH --note "Artifact review feedback"`,
        "",
      ];
      const guidedLines = buildGuidedResponseExport();
      if (!comments.length && !guidedLines.length) {
        lines.push("No local comments or guided responses were saved before export.", "");
        return lines.join("\n");
      }
      comments.forEach(comment => {
        const gapId = comment.gap_id || (String(comment.marker || "").startsWith("GAP-") ? comment.marker : "");
        const evidence = `${model.source_path}#${comment.target_id}${comment.line_start ? " lines " + comment.line_start + "-" + comment.line_end : ""}`;
        if (gapId) {
          lines.push(`### ${gapId}`);
          lines.push(`- Answer: ${singleLine(comment.text)}`);
          lines.push(`- Owner / source: ${singleLine(comment.owner_source || "Artifact review comment")}`);
          lines.push(`- Evidence or reference: ${singleLine(evidence)}`);
          lines.push(`- Decision status: ${singleLine(comment.decision_status || "pending")}`);
          lines.push("");
        } else {
          lines.push(`### Review Comment: ${comment.id}`);
          lines.push(`- Target: ${comment.target_type} \`${comment.target_id}\``);
          lines.push(`- Source artifact: \`${model.source_path}\``);
          if (comment.section_path) lines.push(`- Section: ${comment.section_path}`);
          lines.push(`- Comment: ${singleLine(comment.text)}`);
          lines.push(`- Suggested command: \`sentinel /sync ${model.project_id} --source PATH --note "Artifact review feedback"\``);
          lines.push("");
        }
      });
      if (guidedLines.length) {
        lines.push("## Guided Responses", "");
        guidedLines.forEach(line => lines.push(line));
      }
      return lines.join("\n");
    }
    function buildGuidedResponseExport() {
      // IMP-211 (H10, H-JOSE-1): the client's drafted guided answers used to
      // stay trapped in localStorage — the exported .md only carried
      // feedbackComments. Fold them in so the round-trip to /resolve-gaps works.
      const items = model.guided_response?.items || [];
      const out = [];
      items.forEach(item => {
        const answer = String(guidedAnswers[item.id] || "").trim();
        if (!answer) return;
        const prompt = item.question || item.statement || item.expected_format || item.id;
        if (String(item.id).startsWith("GAP-")) {
          out.push(`### ${item.id}`);
          out.push(`- Question: ${singleLine(prompt)}`);
          out.push(`- Answer: ${singleLine(answer)}`);
          out.push("- Owner / source: Client guided response");
          out.push("- Decision status: pending");
          out.push("");
        } else {
          out.push(`### Guided Response: ${item.id}`);
          out.push(`- Question: ${singleLine(prompt)}`);
          out.push(`- Answer: ${singleLine(answer)}`);
          out.push("");
        }
      });
      return out;
    }
    function sectionForTarget(target) {
      if (target.type === "section") return model.sections.find(section => section.id === target.id);
      const marker = model.markers.find(item => item.id === target.id);
      if (marker) return model.sections.find(section => section.id === marker.section_id);
      return model.sections[0];
    }
    function singleLine(value) {
      return String(value ?? "").replace(/\s+/g, " ").trim();
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }
    function label(key) {
      return key.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }
  </script>
</body>
