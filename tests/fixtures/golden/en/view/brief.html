<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ignite Artifact View</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #5b6871;
      --line: #d8dee4;
      --panel: #f7f9fb;
      --accent: #0f766e;
      --accent-2: #7c3aed;
      --warn: #b45309;
      --gap: #b91c1c;
      --ok: #1d4ed8;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: #ffffff; }
    header { padding: 22px 28px 18px; border-bottom: 1px solid var(--line); background: #f9fbfc; }
    .eyebrow { color: var(--accent); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    h1 { margin: 6px 0 8px; font-size: 28px; line-height: 1.15; letter-spacing: 0; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px 18px; color: var(--muted); font-size: 13px; }
    .layout { display: grid; grid-template-columns: minmax(210px, 260px) minmax(0, 1fr) minmax(250px, 310px); min-height: calc(100vh - 94px); }
    nav, aside { position: sticky; top: 0; align-self: start; max-height: 100vh; overflow: auto; padding: 18px; background: var(--panel); border-right: 1px solid var(--line); }
    aside { border-right: 0; border-left: 1px solid var(--line); }
    main { min-width: 0; padding: 22px 30px 60px; }
    input[type="search"] { width: 100%; height: 34px; border: 1px solid var(--line); border-radius: 6px; padding: 0 10px; font: inherit; background: #fff; }
    .toc { margin-top: 16px; display: grid; gap: 4px; }
    .toc a { color: var(--ink); text-decoration: none; font-size: 13px; padding: 7px 8px; border-radius: 6px; border: 1px solid transparent; }
    .toc a:hover { border-color: var(--line); background: #fff; }
    .toc .level-2 { padding-left: 16px; }
    .toc .level-3, .toc .level-4, .toc .level-5, .toc .level-6 { padding-left: 24px; color: var(--muted); }
    .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin: 16px 0; }
    .stat { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 10px; }
    .stat strong { display: block; font-size: 21px; }
    .stat span { color: var(--muted); font-size: 12px; }
    section.artifact-section { padding: 14px 0 24px; border-bottom: 1px solid var(--line); scroll-margin-top: 16px; }
    section.artifact-section.hidden { display: none; }
    .section-meta { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .content h1, .content h2, .content h3 { letter-spacing: 0; }
    .content h1 { font-size: 25px; }
    .content h2 { font-size: 21px; }
    .content h3 { font-size: 18px; }
    .content p, .content li { line-height: 1.55; }
    code { background: #eef2f6; padding: 1px 5px; border-radius: 4px; }
    pre { overflow: auto; background: #101820; color: #f4f7fa; border-radius: 8px; padding: 12px; }
    mark.marker { border-radius: 4px; padding: 1px 3px; }
    mark.pending { background: #fef3c7; color: #7c2d12; }
    mark.gap { background: #fee2e2; color: #7f1d1d; }
    mark.assumption { background: #ede9fe; color: #4c1d95; }
    mark.marker:target { outline: 2px solid var(--accent); outline-offset: 2px; }
    .badge { display: inline-flex; align-items: center; min-height: 22px; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .badge.populated { background: #dcfce7; color: #14532d; }
    .badge.pending { background: #fef3c7; color: #7c2d12; }
    .badge.assumed { background: #ede9fe; color: #4c1d95; }
    .side-title { margin: 16px 0 8px; font-size: 13px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: .06em; }
    select { width: 100%; height: 34px; border: 1px solid var(--line); border-radius: 6px; padding: 0 8px; font: inherit; background: #fff; }
    .pill-list { display: grid; gap: 8px; }
    .pill { display: block; text-decoration: none; color: var(--ink); background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--accent); border-radius: 8px; padding: 9px; font-size: 13px; }
    .pill.gap { border-left-color: var(--gap); }
    .pill.pending { border-left-color: var(--warn); }
    .pill.assumption { border-left-color: var(--accent-2); }
    .pill[hidden] { display: none; }
    .pill-meta { margin-top: 6px; color: var(--muted); display: grid; gap: 4px; }
    .pill-meta b { color: var(--ink); }
    .evidence-card { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 9px; font-size: 13px; }
    .evidence-card summary { cursor: pointer; font-weight: 700; }
    .evidence-card summary span { color: var(--muted); font-weight: 400; }
    .mini-graph { margin-top: 8px; display: grid; gap: 5px; }
    .mini-node, .mini-edge { border: 1px solid var(--line); border-radius: 6px; padding: 6px; background: #fbfcfd; }
    .mini-edge { color: var(--muted); }
    .source-fragment { max-height: 220px; white-space: pre-wrap; overflow: auto; background: #101820; color: #f4f7fa; border-radius: 8px; padding: 10px; font-family: Consolas, monospace; font-size: 12px; }
    .empty { color: var(--muted); font-size: 13px; }
    button { font: inherit; }
    .source-toggle, .feedback-target, .feedback-action { margin-top: 10px; border: 1px solid var(--line); background: #fff; border-radius: 6px; padding: 7px 10px; cursor: pointer; }
    .feedback-target { margin-right: 6px; }
    .feedback-action.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .markdown-source { display: none; white-space: pre-wrap; margin-top: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfd; padding: 12px; font-family: Consolas, monospace; font-size: 12px; overflow: auto; }
    .markdown-source.open { display: block; }
    .feedback-panel { display: grid; gap: 8px; background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 9px; font-size: 13px; }
    .feedback-panel label { display: grid; gap: 4px; color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .feedback-panel input, .feedback-panel textarea { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 8px; font: inherit; background: #fff; }
    .feedback-panel textarea { min-height: 88px; resize: vertical; }
    .feedback-target-note { color: var(--muted); font-size: 12px; }
    .feedback-list { display: grid; gap: 7px; }
    .feedback-item { border: 1px solid var(--line); border-radius: 6px; padding: 7px; background: #fbfcfd; }
    .feedback-export { display: none; max-height: 180px; white-space: pre-wrap; overflow: auto; border: 1px solid var(--line); border-radius: 6px; background: #101820; color: #f4f7fa; padding: 8px; font-family: Consolas, monospace; font-size: 11px; }
    .feedback-export.open { display: block; }
    .pill a { color: var(--ink); text-decoration: none; }
    .guided-panel { display: grid; gap: 8px; }
    .guided-progress { color: var(--muted); font-size: 12px; }
    .guided-item { background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--ok); border-radius: 8px; padding: 9px; font-size: 13px; }
    .guided-item.domain { border-left-color: var(--warn); }
    .guided-item.ba_assumption { border-left-color: var(--accent-2); }
    .guided-item textarea { width: 100%; min-height: 70px; margin-top: 7px; border: 1px solid var(--line); border-radius: 6px; padding: 8px; font: inherit; resize: vertical; }
    .guided-item a { color: var(--ink); text-decoration: none; font-weight: 700; }
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      nav, aside { position: static; max-height: none; border: 0; border-bottom: 1px solid var(--line); }
      main { padding: 18px; }
    }
  </style>
</head>

, "markdown": "### Cobertura Multi-Lente\n\n| Lens | Reviewer Stance | Evidence Found | Critical Questions | Related Gaps |\n| --- | --- | --- | --- | --- |\n| business/product | Senior BA / Product Lead | Source only; no domain context folder evidence | What outcome, user, scope boundary, metric source, or priority remains ambiguous? | `GAP-BUSINESS-RULES`, `GAP-METRIC-DEFINITION`, `GAP-METRIC-SOURCE`, `GAP-PRD-PERSONA-DETAIL` |\n| product | Product Strategist | Source only; no domain context folder evidence | Is the as-is/to-be delta, rule set, dependency map, and rollout path clear enough to shape PRD and backlog? | `GAP-BACKLOG-SLICING-READINESS`, `GAP-BUSINESS-RULES`, `GAP-DELIVERY-READINESS`, `GAP-PRD-FR-AC`, `GAP-PRODUCT-ASIS-TOBE` |\n| technical | Tech Lead | Source only; no domain context folder evidence | Which systems, endpoint/event surfaces, create/modify/reuse decisions, security, observability, or ownership constraints are required before Technology can deepen the design? | `GAP-BACKEND-SURFACE`, `GAP-BACKLOG-ENABLERS`, `GAP-FRONTEND-SURFACE`, `GAP-TECH-DATA-SOURCE`, `GAP-TECH-DEEP-DIVE-INPUT`, `GAP-TECH-NFR` |\n| design | UX/UI Designer | Source only; no domain context folder evidence | Which journey, screens, states, error/empty/loading behavior, or accessibility requirements are unresolved? | `GAP-DESIGN-FLOW`, `GAP-DESIGN-PROTOTYPE-INPUT`, `GAP-DESIGN-STATES` |\n| quality | Quality Lead | Source only; no domain context folder evidence | What acceptance criteria, risks, negative paths, stale/missing data cases, or test evidence are missing? | `GAP-ACCEPTANCE`, `GAP-PRD-NFR-KPI`, `GAP-QUALITY`, `GAP-QUALITY-HANDOFF` |\n", "children": [{"id": "block-013.001", "type": "section", "line_start": 79, "line_end": 79, "markdown": "### Cobertura Multi-Lente"}, {"id": "block-013.002", "type": "decision", "line_start": 81, "line_end": 87, "markdown": "| Lens | Reviewer Stance | Evidence Found | Critical Questions | Related Gaps |\n| --- | --- | --- | --- | --- |\n| business/product | Senior BA / Product Lead | Source only; no domain context folder evidence | What outcome, user, scope boundary, metric source, or priority remains ambiguous? | `GAP-BUSINESS-RULES`, `GAP-METRIC-DEFINITION`, `GAP-METRIC-SOURCE`, `GAP-PRD-PERSONA-DETAIL` |\n| product | Product Strategist | Source only; no domain context folder evidence | Is the as-is/to-be delta, rule set, dependency map, and rollout path clear enough to shape PRD and backlog? | `GAP-BACKLOG-SLICING-READINESS`, `GAP-BUSINESS-RULES`, `GAP-DELIVERY-READINESS`, `GAP-PRD-FR-AC`, `GAP-PRODUCT-ASIS-TOBE` |\n| technical | Tech Lead | Source only; no domain context folder evidence | Which systems, endpoint/event surfaces, create/modify/reuse decisions, security, observability, or ownership constraints are required before Technology can deepen the design? | `GAP-BACKEND-SURFACE`, `GAP-BACKLOG-ENABLERS`, `GAP-FRONTEND-SURFACE`, `GAP-TECH-DATA-SOURCE`, `GAP-TECH-DEEP-DIVE-INPUT`, `GAP-TECH-NFR` |\n| design | UX/UI Designer | Source only; no domain context folder evidence | Which journey, screens, states, error/empty/loading behavior, or accessibility requirements are unresolved? | `GAP-DESIGN-FLOW`, `GAP-DESIGN-PROTOTYPE-INPUT`, `GAP-DESIGN-STATES` |\n| quality | Quality Lead | Source only; no domain context folder evidence | What acceptance criteria, risks, negative paths, stale/missing data cases, or test evidence are missing? | `GAP-ACCEPTANCE`, `GAP-PRD-NFR-KPI`, `GAP-QUALITY`, `GAP-QUALITY-HANDOFF` |"}]}, {"id": "block-014", "type": "section", "level": 3, "title": "Inferencias Controladas", "section_path": "Project Brief - [PROJECT_ID] > 7. Decisiones, Seeds e Inferencias > Inferencias Controladas", "line_start": 89, "line_end": 93, "markdown": "### Inferencias Controladas\n\n- Any inference must name the source signal and the risk if wrong.\n- Inferences cannot close critical or high gaps without client/domain confirmation.\n", "children": [{"id": "block-014.001", "type": "section", "line_start": 89, "line_end": 89, "markdown": "### Inferencias Controladas"}, {"id": "block-014.002", "type": "ears-statement", "line_start": 91, "line_end": 92, "markdown": "- Any inference must name the source signal and the risk if wrong.\n- Inferences cannot close critical or high gaps without client/domain confirmation."}]}, {"id": "block-015", "type": "section", "level": 2, "title": "8. Radar de Incertidumbres: GAPs", "section_path": "Project Brief - [PROJECT_ID] > 8. Radar de Incertidumbres: GAPs", "line_start": 94, "line_end": 120, "markdown": "## 8. Radar de Incertidumbres: GAPs\n\n- `GAP-BUSINESS-RULES` (business, medium): Business rules, exclusions, or decision rules are not explicit enough for downstream slicing.\n- `GAP-PRD-PERSONA-DETAIL` (business, medium): Persona attributes are not complete enough for a PRD: goals, pain points, proficiency, and usage frequency are unclear.\n- `GAP-METRIC-SOURCE` (business, medium): Quantitative metric appears without an explicit source or baseline.\n- `GAP-METRIC-DEFINITION` (business, medium): A metric, KPI, or indicator concept is named without its definition, formula, unit, source, or threshold.\n- `GAP-PRODUCT-ASIS-TOBE` (product, medium): Current state and target state are not both explicit enough to compare impact.\n- `GAP-BACKLOG-SLICING-READINESS` (product, medium): Backlog slicing signals are not explicit enough: first value slice, workflow paths, variants, rule deferral, or story boundaries are unclear.\n- `GAP-PRD-FR-AC` (product, medium): Functional requirements are not decomposed with source-backed acceptance criteria.\n- `GAP-QUALITY` (quality, medium): Quality or testability expectations are not explicit.\n- `GAP-QUALITY-HANDOFF` (quality, medium): Quality handoff is not explicit enough: critical flows, edge cases, test data, regression risks, or evidence expectations are unclear.\n- `GAP-PRD-NFR-KPI` (quality, medium): NFRs, KPIs, targets, measurement method, or timeframe are not explicit enough for PRD governance.\n- `GAP-TECH-DATA-SOURCE` (technical, medium): Data source, integration, or system ownership is not explicit in source or technology context.\n- `GAP-TECH-NFR` (technical, medium): Performance, security, observability, or operational constraints are not explicit.\n- `GAP-BACKLOG-ENABLERS` (technical, medium): Cross-cutting enablers are not explicit enough: implementation work that must be built in advance across frontend/backend or architecture surfaces must be tied to confirmed project functionality and boundary.\n- `GAP-FRONTEND-SURFACE` (technical, medium): Frontend implementation surface is not explicit enough: affected screens, states, validations, copy, roles, or API binding needs are unclear.\n- `GAP-BACKEND-SURFACE` (technical, medium): Backend implementation surface is not explicit enough: capabilities, integrations, rules, persistence, contracts, or failure behavior are unclear.\n- `GAP-TECH-DEEP-DIVE-INPUT` (technical, medium): Technology has insufficient input to perform repository, architecture, endpoint/event, source-of-truth, or risk analysis.\n- `GAP-GOVERNANCE-CONSTRAINTS` (compliance, medium): Governance, security, privacy, compliance, or operational restrictions are not explicit.\n- `GAP-PRD-GLOSSARY-GOVERNANCE` (compliance, medium): Glossary, mandatory constraints, pending inputs, or governance/audit notes are not explicit enough for a complete PRD.\n- `GAP-DELIVERY-READINESS` (delivery, medium): Dependencies, environments, ownership, timing, or rollout constraints are not explicit.\n- `GAP-PRD-DEPENDENCIES-ROADMAP` (delivery, medium): Dependencies, owners, MVP scope, nice-to-haves, or roadmap are not explicit enough for PRD execution planning.\n- `GAP-PRD-ROLLOUT-ENVIRONMENTS` (delivery, medium): Rollout approach, target environments, or release constraints are not explicit enough for PRD execution planning.\n- `GAP-DESIGN-FLOW` (design, medium): User journey, screen flow, or interaction model is not explicit in source or design context.\n- `GAP-DESIGN-STATES` (design, medium): Required UI states for loading, empty, error, and recovery are not explicit.\n- `GAP-DESIGN-PROTOTYPE-INPUT` (design, medium): The requirement does not make clear what Design must prototype or validate in user flows.\n", "children": [{"id": "block-015.001", "type": "section", "line_start": 94, "line_end": 94, "markdown": "## 8. Radar de Incertidumbres: GAPs"}, {"id": "block-015.002", "type": "decision", "line_start": 96, "line_end": 119, "markdown": "- `GAP-BUSINESS-RULES` (business, medium): Business rules, exclusions, or decision rules are not explicit enough for downstream slicing.\n- `GAP-PRD-PERSONA-DETAIL` (business, medium): Persona attributes are not complete enough for a PRD: goals, pain points, proficiency, and usage frequency are unclear.\n- `GAP-METRIC-SOURCE` (business, medium): Quantitative metric appears without an explicit source or baseline.\n- `GAP-METRIC-DEFINITION` (business, medium): A metric, KPI, or indicator concept is named without its definition, formula, unit, source, or threshold.\n- `GAP-PRODUCT-ASIS-TOBE` (product, medium): Current state and target state are not both explicit enough to compare impact.\n- `GAP-BACKLOG-SLICING-READINESS` (product, medium): Backlog slicing signals are not explicit enough: first value slice, workflow paths, variants, rule deferral, or story boundaries are unclear.\n- `GAP-PRD-FR-AC` (product, medium): Functional requirements are not decomposed with source-backed acceptance criteria.\n- `GAP-QUALITY` (quality, medium): Quality or testability expectations are not explicit.\n- `GAP-QUALITY-HANDOFF` (quality, medium): Quality handoff is not explicit enough: critical flows, edge cases, test data, regression risks, or evidence expectations are unclear.\n- `GAP-PRD-NFR-KPI` (quality, medium): NFRs, KPIs, targets, measurement method, or timeframe are not explicit enough for PRD governance.\n- `GAP-TECH-DATA-SOURCE` (technical, medium): Data source, integration, or system ownership is not explicit in source or technology context.\n- `GAP-TECH-NFR` (technical, medium): Performance, security, observability, or operational constraints are not explicit.\n- `GAP-BACKLOG-ENABLERS` (technical, medium): Cross-cutting enablers are not explicit enough: implementation work that must be built in advance across frontend/backend or architecture surfaces must be tied to confirmed project functionality and boundary.\n- `GAP-FRONTEND-SURFACE` (technical, medium): Frontend implementation surface is not explicit enough: affected screens, states, validations, copy, roles, or API binding needs are unclear.\n- `GAP-BACKEND-SURFACE` (technical, medium): Backend implementation surface is not explicit enough: capabilities, integrations, rules, persistence, contracts, or failure behavior are unclear.\n- `GAP-TECH-DEEP-DIVE-INPUT` (technical, medium): Technology has insufficient input to perform repository, architecture, endpoint/event, source-of-truth, or risk analysis.\n- `GAP-GOVERNANCE-CONSTRAINTS` (compliance, medium): Governance, security, privacy, compliance, or operational restrictions are not explicit.\n- `GAP-PRD-GLOSSARY-GOVERNANCE` (compliance, medium): Glossary, mandatory constraints, pending inputs, or governance/audit notes are not explicit enough for a complete PRD.\n- `GAP-DELIVERY-READINESS` (delivery, medium): Dependencies, environments, ownership, timing, or rollout constraints are not explicit.\n- `GAP-PRD-DEPENDENCIES-ROADMAP` (delivery, medium): Dependencies, owners, MVP scope, nice-to-haves, or roadmap are not explicit enough for PRD execution planning.\n- `GAP-PRD-ROLLOUT-ENVIRONMENTS` (delivery, medium): Rollout approach, target environments, or release constraints are not explicit enough for PRD execution planning.\n- `GAP-DESIGN-FLOW` (design, medium): User journey, screen flow, or interaction model is not explicit in source or design context.\n- `GAP-DESIGN-STATES` (design, medium): Required UI states for loading, empty, error, and recovery are not explicit.\n- `GAP-DESIGN-PROTOTYPE-INPUT` (design, medium): The requirement does not make clear what Design must prototype or validate in user flows."}]}, {"id": "block-016", "type": "section", "level": 2, "title": "9. Preparacion para PRD, Specs y Backlog", "section_path": "Project Brief - [PROJECT_ID] > 9. Preparacion para PRD, Specs y Backlog", "line_start": 121, "line_end": 130, "markdown": "## 9. Preparacion para PRD, Specs y Backlog\n\n- PRD can expand this brief only from confirmed seeds, decisions, context folders, and traceable source material.\n- Specs must preserve system boundaries, data ownership, UX states, NFRs, and acceptance strategy.\n- Backlog must be dev-ready, testable, vertically sliced, and linked to requirement, brief, PRD, acceptance criteria, tests, and changes.\n- Backlog slicing must not split below the value boundary. A small story must remain meaningful, testable, and useful by itself.\n- Cross-cutting enablers are implementation work, frontend/backend/architecture, that must be built in advance to support confirmed functionality across stories, epics, FRs, or implementation surfaces.\n- A valid enabler names the capability boundary it supports, why it must be built earlier, which risk/dependency it reduces, and what objective evidence proves completion.\n- Generic setup, environment availability, broad infrastructure hardening, or statements such as \"make an internal tool accessible\" are operational preconditions or external tasks unless tied to confirmed project functionality and implementation evidence.\n", "children": [{"id": "block-016.001", "type": "section", "line_start": 121, "line_end": 121, "markdown": "## 9. Preparacion para PRD, Specs y Backlog"}, {"id": "block-016.002", "type": "decision", "line_start": 123, "line_end": 129, "markdown": "- PRD can expand this brief only from confirmed seeds, decisions, context folders, and traceable source material.\n- Specs must preserve system boundaries, data ownership, UX states, NFRs, and acceptance strategy.\n- Backlog must be dev-ready, testable, vertically sliced, and linked to requirement, brief, PRD, acceptance criteria, tests, and changes.\n- Backlog slicing must not split below the value boundary. A small story must remain meaningful, testable, and useful by itself.\n- Cross-cutting enablers are implementation work, frontend/backend/architecture, that must be built in advance to support confirmed functionality across stories, epics, FRs, or implementation surfaces.\n- A valid enabler names the capability boundary it supports, why it must be built earlier, which risk/dependency it reduces, and what objective evidence proves completion.\n- Generic setup, environment availability, broad infrastructure hardening, or statements such as \"make an internal tool accessible\" are operational preconditions or external tasks unless tied to confirmed project functionality and implementation evidence."}]}, {"id": "block-017", "type": "section", "level": 3, "title": "Backlog Readiness Signals", "section_path": "Project Brief - [PROJECT_ID] > 9. Preparacion para PRD, Specs y Backlog > Backlog Readiness Signals", "line_start": 131, "line_end": 139, "markdown": "### Backlog Readiness Signals\n\n| Signal | Expected Evidence | If Missing |\n| --- | --- | --- |\n| First value slice | The smallest observable increment that validates user/business value. | Open `GAP-BACKLOG-SLICING-READINESS`. |\n| Slice boundaries | Paths, variants, rule deferral, and the point where smaller splits stop producing value. | Open `GAP-BACKLOG-SLICING-READINESS`. |\n| Cross-cutting enablers | Frontend/backend/architecture work from SAD, as-is/to-be architecture, design prototypes, or specs that must be built in advance to support confirmed functionality. | Open `GAP-BACKLOG-ENABLERS`. |\n| Preconditions vs backlog | Operational setup that must exist but should not become a loose backlog item. | Keep as dependency/precondition, not a user story. |\n", "children": [{"id": "block-017.001", "type": "section", "line_start": 131, "line_end": 131, "markdown": "### Backlog Readiness Signals"}, {"id": "block-017.002", "type": "requirement-table", "line_start": 133, "line_end": 138, "markdown": "| Signal | Expected Evidence | If Missing |\n| --- | --- | --- |\n| First value slice | The smallest observable increment that validates user/business value. | Open `GAP-BACKLOG-SLICING-READINESS`. |\n| Slice boundaries | Paths, variants, rule deferral, and the point where smaller splits stop producing value. | Open `GAP-BACKLOG-SLICING-READINESS`. |\n| Cross-cutting enablers | Frontend/backend/architecture work from SAD, as-is/to-be architecture, design prototypes, or specs that must be built in advance to support confirmed functionality. | Open `GAP-BACKLOG-ENABLERS`. |\n| Preconditions vs backlog | Operational setup that must exist but should not become a loose backlog item. | Keep as dependency/precondition, not a user story. |"}]}, {"id": "block-018", "type": "section", "level": 2, "title": "10. PRD Coverage Readiness", "section_path": "Project Brief - [PROJECT_ID] > 10. PRD Coverage Readiness", "line_start": 140, "line_end": 152, "markdown": "## 10. PRD Coverage Readiness\n\n| PRD Section | Required Discovery Signal | Evidence Source | If Missing |\n| --- | --- | --- | --- |\n| Personas | Primary/secondary personas, goals, pains, proficiency, usage frequency, impacted teams. | `01_discovery/identity_seeds.md`, `00_raw/01_business_context/` | Open `GAP-PRD-PERSONA-DETAIL`. |\n| Functional Requirements | Source-backed FRs, priority, and acceptance criteria per FR. | `02_requirements/requirements.md`, `01_discovery/lens_review.md`, quality context | Open `GAP-PRD-FR-AC`. |\n| NFRs and KPIs | Security, privacy, reliability, auditability, compatibility, targets, measurement method, timeframe. | `00_raw/04_quality_context/`, governance notes, decisions | Open `GAP-PRD-NFR-KPI`. |\n| JTBD Traceability | Core, secondary, emotional/soc , medium): Persona attributes are not complete enough for a PRD: goals, pain points, proficiency, and usage frequency are unclear.\n- `GAP-METRIC-SOURCE` (business, medium): Quantitative metric appears without an explicit source or baseline.\n- `GAP-METRIC-DEFINITION` (business, medium): A metric, KPI, or indicator concept is named without its definition, formula, unit, source, or threshold.\n- `GAP-PRODUCT-ASIS-TOBE` (product, medium): Current state and target state are not both explicit enough to compare impact.\n- `GAP-BACKLOG-SLICING-READINESS` (product, medium): Backlog slicing signals are not explicit enough: first value slice, workflow paths, variants, rule deferral, or story boundaries are unclear.\n- `GAP-PRD-FR-AC` (product, medium): Functional requirements are not decomposed with source-backed acceptance criteria.\n- `GAP-QUALITY` (quality, medium): Quality or testability expectations are not explicit.\n- `GAP-QUALITY-HANDOFF` (quality, medium): Quality handoff is not explicit enough: critical flows, edge cases, test data, regression risks, or evidence expectations are unclear.\n- `GAP-PRD-NFR-KPI` (quality, medium): NFRs, KPIs, targets, measurement method, or timeframe are not explicit enough for PRD governance.\n- `GAP-TECH-DATA-SOURCE` (technical, medium): Data source, integration, or system ownership is not explicit in source or technology context.\n- `GAP-TECH-NFR` (technical, medium): Performance, security, observability, or operational constraints are not explicit.\n- `GAP-BACKLOG-ENABLERS` (technical, medium): Cross-cutting enablers are not explicit enough: implementation work that must be built in advance across frontend/backend or architecture surfaces must be tied to confirmed project functionality and boundary.\n- `GAP-FRONTEND-SURFACE` (technical, medium): Frontend implementation surface is not explicit enough: affected screens, states, validations, copy, roles, or API binding needs are unclear.\n- `GAP-BACKEND-SURFACE` (technical, medium): Backend implementation surface is not explicit enough: capabilities, integrations, rules, persistence, contracts, or failure behavior are unclear.\n- `GAP-TECH-DEEP-DIVE-INPUT` (technical, medium): Technology has insufficient input to perform repository, architecture, endpoint/event, source-of-truth, or risk analysis.\n- `GAP-GOVERNANCE-CONSTRAINTS` (compliance, medium): Governance, security, privacy, compliance, or operational restrictions are not explicit.\n- `GAP-PRD-GLOSSARY-GOVERNANCE` (compliance, medium): Glossary, mandatory constraints, pending inputs, or governance/audit notes are not explicit enough for a complete PRD.\n- `GAP-DELIVERY-READINESS` (delivery, medium): Dependencies, environments, ownership, timing, or rollout constraints are not explicit.\n- `GAP-PRD-DEPENDENCIES-ROADMAP` (delivery, medium): Dependencies, owners, MVP scope, nice-to-haves, or roadmap are not explicit enough for PRD execution planning.\n- `GAP-PRD-ROLLOUT-ENVIRONMENTS` (delivery, medium): Rollout approach, target environments, or release constraints are not explicit enough for PRD execution planning.\n- `GAP-DESIGN-FLOW` (design, medium): User journey, screen flow, or interaction model is not explicit in source or design context.\n- `GAP-DESIGN-STATES` (design, medium): Required UI states for loading, empty, error, and recovery are not explicit.\n- `GAP-DESIGN-PROTOTYPE-INPUT` (design, medium): The requirement does not make clear what Design must prototype or validate in user flows.\n", "blocks": [{"id": "block-015.001", "type": "section", "line_start": 94, "line_end": 94, "markdown": "## 8. Radar de Incertidumbres: GAPs"}, {"id": "block-015.002", "type": "decision", "line_start": 96, "line_end": 119, "markdown": "- `GAP-BUSINESS-RULES` (business, medium): Business rules, exclusions, or decision rules are not explicit enough for downstream slicing.\n- `GAP-PRD-PERSONA-DETAIL` (business, medium): Persona attributes are not complete enough for a PRD: goals, pain points, proficienc ase breaches SLA, the system shall flag the queue as high risk. | `GAP-ACCEPTANCE` / `CHG-002` |\n| REQ-EARS-003 | event | When a queue has no open cases, the system shall hide risk indicators. | `GAP-ACCEPTANCE` / `CHG-003` |\n| REQ-EARS-004 | state | While risk data is stale, the system shall show a stale data warning. | `GAP-ACCEPTANCE` / `CHG-004` |\n| REQ-EARS-005 | unwanted | If the metrics service is unavailable, then the system shall show risk status unknown. | `GAP-ACCEPTANCE` / `CHG-005` |\n| REQ-EARS-006 | optional | Where audit logging is enabled, the system shall record dashboard access. | `GAP-ACCEPTANCE` / `CHG-006` |"}, "mini_graph": {"nodes": [{"id": "DEC-001", "type": "decision_log", "title": "Pending decisions", "path": "workspaces/[PROJECT_ID]/01_discovery/decisions.md", "status": "pending", "domain": "product"}, {"id": "DISC-003", "type": "knowledge_ledger", "title": "Lens knowledge ledger", "path": "workspaces/[PROJECT_ID]/01_discovery/knowledge_state.md", "status": "active", "domain": "product"}, {"id": "DISC-004", "type": "source_synthesis", "title": "Per-source synthesis", "path": "workspaces/[PROJECT_ID]/01_discovery/source_synthesis.md", "status": "active", "domain": "product"}, {"id": "GAP-001", "type": "gap_report", "title": "Discovery gaps", "path": "workspaces/[PROJECT_ID]/01_discovery/gaps.md", "status": "open", "domain": "product"}, {"id": "PRD-001", "type": "prd", "title": "Human-readable PRD", "path": "workspaces/[PROJECT_ID]/03_specs/prd.md", "status": "active", "domain": "product"}, {"id": "RAW-001", "type": "raw_input", "title": "raw", "path": "workspaces/[PROJECT_ID]/00_raw/raw.md", "status": "active", "domain": "product"}, {"id": "REQ-001", "type": "requirement", "title": "Primary requirement", "path": "workspaces/[PROJECT_ID]/02_requirements/requirements.md", "status": "active", "domain": "product"}, {"id": "REQ-003", "type": "project_brief", "title": "Mature project brief", "path": "workspaces/[PROJECT_ID]/02_requirements/pr       const fragment = item.source_fragment || {};
      const graph = item.mini_graph || { nodes: [], edges: [] };
      return `<details class="evidence-card" id="evidence-${item.id}">
        <summary>${escapeHtml(item.citation)} <span>${escapeHtml(node.type || "citation")} · ${escapeHtml(item.section_path || "")}</span></summary>
        <div class="pill-meta">
          ${node.id ? `<span><b>Trace node:</b> ${escapeHtml(node.id)} · ${escapeHtml(node.title || "")}</span>` : `<span><b>Trace node:</b> No matching graph node</span>`}
          ${node.path ? `<span><b>Path:</b> ${escapeHtml(node.path)}</span>` : ""}
          ${fragment.available ? `<span><b>Source Fragment:</b> lines ${fragment.line_start}-${fragment.line_end}${fragment.truncated ? " · truncated" : ""}</span><pre class="source-fragment">${escapeHtml(fragment.text)}</pre>` : `<span><b>Source Fragment:</b> not available in local graph path</span>`}
          ${miniGraphHtml(graph)}
        </div>
      </details>`;
    }
    function miniGraphHtml(graph) {
      const nodes = graph.nodes || [];
      const edges = graph.edges || [];
      if (!nodes.length && !edges.length) return `<span><b>Mini Trace:</b> no direct graph relations found.</span>`;
      return `<div class="mini-graph"><b>Mini Trace</b>
        ${nodes.map(n => `<div class="mini-node"><strong>${escapeHtml(n.id || "")}</strong><br>${escapeHtml(n.type || "")} · ${escapeHtml(n.title || "")}</div>`).join("")}
        ${edges.map(e => `<div class="mini-edge">${escapeHtml(e.from || "")} → ${escapeHtml(e.to || "")} · ${escapeHtml(e.relation || "")}</div>`).join("")}
      </div>`;
    }
    function metadataHtml(item) {
      const meta = item.metadata || {};
      const rows = [];
      if (meta.lens || meta.severity || meta.status) rows.push(`<span><b>Lens/status:</b> ${escapeHtml([meta.lens, meta.severity, meta.status].filter(Boolean).join(" · "))}</span>`);
      if (meta.why) rows.push(`<span><b>Why it matters:</b> ${escapeHtml(meta.why)}</span>`);
      if (meta.unblocks) rows.push(`<span><b>Unblocks:</b> ${escapeHtml(meta.unblocks)}</span>`);
      if (meta.expected_format) rows.push(`<span><b>Expected format:</b> ${escapeHtml(meta.expected_format)}</span>`);
      if (meta.owner || meta.risk) rows.push(`<span><b>Owner/risk:</b> ${escapeHtml([meta.owner, meta.risk].filter(Boolean).join(" · "))}</span>`);
      if (meta.statement) rows.push(`<span><b>Assumption:</b> ${escapeHtml(meta.statement)}</span>`);
      if (meta.closes_gap) rows.push(`<span><b>Closes gap:</b> ${escapeHtml(meta.closes_gap)}</span>`);
      if (meta.readiness_cells?.length) rows.push(`<span><b>Readiness:</b> ${escapeHtml(meta.readiness_cells.map(c => [c.area, c.lens, c.status].filter(Boolean).join(" / ")).join("; "))}</span>`);
      return rows.length ? `<span class="pill-meta">${rows.join("")}</span>` : "";
    }
    function highlightSection(section) {
      let value = section.html;
      model.markers.filter(m => m.section_id === section.id).forEach(marker => {
        const pattern = new RegExp(escapeRegExp(marker.marker));
        value = value.replace(pattern, `<mark id="${marker.id}" class="marker ${marker.kind}">${escapeHtml(marker.marker)}</mark>`);
      });
      return value;
    }
    function loadGuidedAnswers() {
      try {
        const value = JSON.parse(localStorage.getItem(guidedKey) || "{}");
        return value && typeof value === "object" && !Array.isArray(value) ? value : {};
      } catch {
        return {};
      }
    }
    function persistGuidedAnswers() {
      localStorage.setItem(guidedKey, JSON.stringify(guidedAnswers));
    }
    function renderGuidedResponses() {
      const filter = $("guidedAudienceFilter").value;
      const items = (model.guided_response?.items || []).filter(item => filter === "all" || item.audience === filter);
      $("guidedResponses").innerHTML = items.length
        ? items.map(guidedItemHtml).join("")
        : `<div class="empty">No guided items for this audience.</div>`;
      renderGuidedProgress();
    }
    function renderGuidedProgress() {
      const clientItems = (model.guided_response?.items || []).filter(item => item.audience === "client" && item.response_needed);
      const answered = clientItems.filter(item => String(guidedAnswers[item.id] || "").trim()).length;
      $("guidedProgress").textContent = `Client progress: ${answered}/${clientItems.length}`;
    }
    function guidedItemHtml(item) {
      const answer = guidedAnswers[item.id] || "";
      const details = [
        item.lens,
        item.severity,
        item.status,
        item.audience_label
      ].filter(Boolean).join(" · ");
      const prompt = item.question || item.statement || item.expected_format || item.id;
      const expected = item.expected_format ? `<span><b>Expected format:</b> ${escapeHtml(item.expected_format)}</span>` : "";
      const owner = item.owner || item.risk ? `<span><b>Owner/risk:</b> ${escapeHtml([item.owner, item.risk].filter(Boolean).join(" · "))}</span>` : "";
      const textarea = item.audience === "client" && item.response_needed
        ? `<textarea class="guided-answer" data-guided-id="${escapeHtml(item.id)}" placeholder="Draft local response">${escapeHtml(answer)}</textarea>`
        : "";
      return `<div class="guided-item ${escapeHtml(item.audience)}">
        <a href="#${escapeHtml(item.marker_id || item.section_id || "content")}">${escapeHtml(item.id)}</a>
        <div class="pill-meta">
          <span>${escapeHtml(details)}</span>
          <span>${escapeHtml(prompt)}</span>
          ${expected}
          ${owner}
        </div>
        ${textarea}
      </div>`;
    }
    function loadFeedback() {
      try {
        const value = JSON.parse(localStorage.getItem(feedbackKey) || "[]");
        return Array.isArray(value) ? value : [];
      } catch {
        return [];
      }
    }
    function persistFeedback() {
      localStorage.setItem(feedbackKey, JSON.stringify(feedbackComments));
    }
    function saveFeedbackComment() {
      const text = $("feedbackText").value.trim();
      if (!text) return;
      const section = sectionForTarget(feedbackTarget);
      const comment = {
        id: "FBC-" + Date.now(),
        target_type: feedbackTarget.type,
        target_id: feedbackTarget.id,
        marker: feedbackTarget.marker || "",
        gap_id: feedbackTarget.gapId || "",
        section_id: section?.id || "",
        section_path: section?.section_path || "",
        line_start: section?.line_start || "",
        line_end: section?.line_end || "",
        owner_source: $("feedbackOwner").value.trim() || "Artifact review comment",
        decision_status: $("feedbackDecision").value,
        text,
        created_at: new Date().toISOString()
      };
      feedbackComments.push(comment);
      persistFeedback();
      $("feedbackText").value = "";
      renderFeedbackList();
    }
    function renderFeedbackTarget() {
      const section = sectionForTarget(feedbackTarget);
      const marker = feedbackTarget.marker ? " / " + feedbackTarget.marker : "";
      $("feedbackTarget").textContent = "Target: " + feedbackTarget.type + " " + feedbackTarget.id + marker + (section ? " · " + section.section_path : "");
    }
    function renderFeedbackList() {
      $("feedbackList").innerHTML = feedbackComments.length
        ? feedbackComments.map(item => `<div class="feedback-item"><strong>${escapeHtml(item.target_type)} ${escapeHtml(item.marker || item.target_id)}</strong><br>${escapeHtml(item.text)}</div>`).join("")
        : `<div class="empty">No local comments saved.</div>`;
    }
    function exportFeedbackMarkdown() {
      const markdown = buildFeedbackExport(feedbackComments);
      $("feedbackExportText").textContent = markdown;
      $("feedbackExportText").classList.add("open");
      const blob = new Blob([markdown], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${model.project_id}-${model.artifact}-feedback.md`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }
    function draftFeedbackEmail() {
      // IMP-211 (H10, H-JOSE-1): restore the mailto draft the approved prototype
      // had (it was lost in the runtime). Local-first: it only opens a pre-filled
      // draft in the user's own mail client, it never sends. mailto cannot carry
      // attachments, so remind the reviewer to attach the downloaded .md.
      const hasGuided = (model.guided_response?.items || []).some(item => String(guidedAnswers[item.id] || "").trim());
      if (!feedbackComments.length && !hasGuided) {
        alert("Save at least one comment or guided answer before drafting the email.");
        return;
      }
      const subject = `Artifact review feedback - ${model.project_id} - ${model.artifact}`;
      const body = buildFeedbackExport(feedbackComments) + "\n\n(If possible, also attach the downloaded .md file - mailto cannot include attachments.)";
      const recipient = model.ba_email || "";
      window.location.href = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }
    function buildFeedbackExport(comments) {
      const lines = [
        `# Artifact Review Feedback Export - ${model.project_id}`,
        "",
        `- Source artifact: ${model.source_path}`,
        `- Generated at: ${new Date().toISOString()}`,
        `- Resolve gaps command: sentinel /resolve-gaps ${model.project_id} --source PATH`,
        `- Sync command: sentinel /sync ${model.project_id} --source PATH --note "Artifact review feedback"`,
        "",
      ];
      const guidedLines = buildGuidedResponseExport();
      if (!comments.length && !guidedLines.length) {
        lines.push("No local comments or guided responses were saved before export.", "");
        return lines.join("\n");
      }
      comments.forEach(comment => {
        const gapId = comment.gap_id || (String(comment.marker || "").startsWith("GAP-") ? comment.marker : "");
        const evidence = `${model.source_path}#${comment.target_id}${comment.line_start ? " lines " + comment.line_start + "-" + comment.line_end : ""}`;
        if (gapId) {
          lines.push(`### ${gapId}`);
          lines.push(`- Answer: ${singleLine(comment.text)}`);
          lines.push(`- Owner / source: ${singleLine(comment.owner_source || "Artifact review comment")}`);
          lines.push(`- Evidence or reference: ${singleLine(evidence)}`);
          lines.push(`- Decision status: ${singleLine(comment.decision_status || "pending")}`);
          lines.push("");
        } else {
          lines.push(`### Review Comment: ${comment.id}`);
          lines.push(`- Target: ${comment.target_type} \`${comment.target_id}\``);
          lines.push(`- Source artifact: \`${model.source_path}\``);
          if (comment.section_path) lines.push(`- Section: ${comment.section_path}`);
          lines.push(`- Comment: ${singleLine(comment.text)}`);
          lines.push(`- Suggested command: \`sentinel /sync ${model.project_id} --source PATH --note "Artifact review feedback"\``);
          lines.push("");
        }
      });
      if (guidedLines.length) {
        lines.push("## Guided Responses", "");
        guidedLines.forEach(line => lines.push(line));
      }
      return lines.join("\n");
    }
    function buildGuidedResponseExport() {
      // IMP-211 (H10, H-JOSE-1): the client's drafted guided answers used to
      // stay trapped in localStorage — the exported .md only carried
      // feedbackComments. Fold them in so the round-trip to /resolve-gaps works.
      const items = model.guided_response?.items || [];
      const out = [];
      items.forEach(item => {
        const answer = String(guidedAnswers[item.id] || "").trim();
        if (!answer) return;
        const prompt = item.question || item.statement || item.expected_format || item.id;
        if (String(item.id).startsWith("GAP-")) {
          out.push(`### ${item.id}`);
          out.push(`- Question: ${singleLine(prompt)}`);
          out.push(`- Answer: ${singleLine(answer)}`);
          out.push("- Owner / source: Client guided response");
          out.push("- Decision status: pending");
          out.push("");
        } else {
          out.push(`### Guided Response: ${item.id}`);
          out.push(`- Question: ${singleLine(prompt)}`);
          out.push(`- Answer: ${singleLine(answer)}`);
          out.push("");
        }
      });
      return out;
    }
    function sectionForTarget(target) {
      if (target.type === "section") return model.sections.find(section => section.id === target.id);
      const marker = model.markers.find(item => item.id === target.id);
      if (marker) return model.sections.find(section => section.id === marker.section_id);
      return model.sections[0];
    }
    function singleLine(value) {
      return String(value ?? "").replace(/\s+/g, " ").trim();
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }
    function label(key) {
      return key.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }
  </script>
</body>
</html>
